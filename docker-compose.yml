version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-postgres
    environment:
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_pass
      POSTGRES_DB: webhook_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook_user -d webhook_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webhook-network

  redis:
    image: redis:7-alpine
    container_name: webhook-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webhook-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webhook-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://webhook_user:webhook_pass@postgres:5432/webhook_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      API_SECRET: ${API_SECRET:-change-me-in-production}
      WORKER_CONCURRENCY: 5
      WEBHOOK_TIMEOUT_MS: 5000
      MAX_RETRY_ATTEMPTS: 5
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    networks:
      - webhook-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webhook-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://webhook_user:webhook_pass@postgres:5432/webhook_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: 5
      WEBHOOK_TIMEOUT_MS: 5000
      MAX_RETRY_ATTEMPTS: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: node dist/workers/index.js
    networks:
      - webhook-network
    restart: unless-stopped

networks:
  webhook-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
